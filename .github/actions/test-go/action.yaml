name: 'Test and Lint — Go'
description: 'Runs golangci-lint, go test with coverage merge, quality gate, Postman, and badge commits for Go repos.'

inputs:
  GO_VERSION:
    description: 'Go version'
    required: false
    default: '1.22'
  LINTER_VERSION:
    description: 'Lint version'
    required: false
    default: 'v1.54.2'
  LINTER_TIMEOUT:
    description: 'Lint timeout'
    required: false
    default: '8m'
  TESTCOVERAGE_THRESHOLD:
    description: 'Test Threshhold'
    required: false
    default: '0'
  ADD_SCHEMA:
    description: 'enable step to load DB schema'
    required: false
    default: 'false'
  SCHEMA_COMMAND:
    description: 'command to load DB schema'
    required: false
    default: ''
  EXTRA_DEPENDENCIES:
    description: 'enable step to install extra dependencies'
    required: false
    default: 'false'
  DEPENDENCIES_COMMAND:
    description: 'commands to install extra dependencies'
    required: false
    default: ''
  MODULES:
    description: 'Space-separated list of sub-module dirs to test separately'
    required: false
    default: ''
  POSTMAN_ENABLED:
    description: 'enable postman collection'
    required: false
    default: 'false'
  APP_NAME:
    description: 'Postman collection filename (without extension)'
    required: false
    default: ''
  SERVER_COMMAND:
    description: 'commands to setup before running server for postman'
    required: false
    default: ''
  PAT:
    description: 'GitHub PAT for private module access'
    required: false

runs:
  using: composite
  steps:

    # ── Language runtime ───────────────────────────────────────────────────
    - uses: actions/setup-go@v4
      with:
        go-version: ${{ inputs.GO_VERSION }}

    # ── Optional: load DB schema before anything else -----------------------
    - name: Add DB schema
      if: ${{ inputs.ADD_SCHEMA == 'true' }}
      shell: bash
      run: ${{ inputs.SCHEMA_COMMAND }}

    # ── Dependencies ───────────────────────────────────────────────────────
    - name: Get Go dependencies
      shell: bash
      run: |
        git config --global url."https://${{ inputs.PAT }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        git config --global http.sslVerify false
        go mod download
        go install go.shabbyrobe.org/gocovmerge/cmd/gocovmerge@latest
        go install github.com/AlexBeauchemin/gobadge@latest

    # ── Optional: extra system/tool dependencies ───────────────────────────
    - name: Extra dependencies
      if: ${{ inputs.EXTRA_DEPENDENCIES == 'true' }}
      shell: bash
      run: ${{ inputs.DEPENDENCIES_COMMAND }}

    # ── Linter ─────────────────────────────────────────────────────────----
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: ${{ inputs.LINTER_VERSION }}
        args: --timeout ${{ inputs.LINTER_TIMEOUT }}
        skip-pkg-cache: true
        skip-build-cache: true

    # ── Tests + coverage (supports multi-module repos) ─────────────────────
    - name: Test
      shell: bash
      run: |
        mkdir -p temp/build

        # Root module
        GOFR_ENV=test go test ./... -count=1 -v \
          -coverprofile temp/cover1.out -coverpkg=./...

        # Optional sub-modules
        modules=$(echo "${{ inputs.MODULES }}" | xargs | tr -d '\r')
        counter=2
        for module in $modules; do
          echo "Testing sub-module: $module"
          cd "$module"
          GOFR_ENV=test go test ./... -count=1 -v \
            -coverprofile "../temp/cover${counter}.out" -coverpkg=./...
          cd ..
          counter=$((counter + 1))
        done

        # Merge all coverage files, strip mocks and migrations
        gocovmerge temp/cover*.out > temp/cover.out
        grep -v "mock_interface" temp/cover.out \
          | grep -v "migrations" > temp/coverage.out

    # ── Coverage report ────────────────────────────────────────────────────
    - name: Coverage report
      shell: bash
      run: go tool cover -func=temp/coverage.out | tee temp/c.out

    # ── Coverage quality gate ──────────────────────────────────────────────
    - name: Coverage quality gate
      shell: bash
      run: |
        threshold="${{ inputs.TESTCOVERAGE_THRESHOLD }}"
        echo "Threshold : ${threshold}%"
        total=$(go tool cover -func=temp/coverage.out \
          | grep 'total:' | grep -Eo '[0-9]+\.[0-9]+')
        echo "Coverage  : ${total}%"
        totalInt=${total%.*}
        if [ "$totalInt" -ge "$threshold" ]; then
          echo "OK"
        else
          echo "Coverage ${total}% is below threshold ${threshold}%."
          echo "Add more tests or lower the threshold."
          exit 1
        fi

    # ── Badge: coverage ────────────────────────────────────────────────────
    - name: Generate and commit coverage badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: bash
      run: |
        gobadge -filename=temp/c.out -target="$(pwd)/README.md"
        git config --global user.email "action@github.com"
        git config --global user.name  "GitHub-Action"
        git config --global --add safe.directory \
          "/__w/$(basename ${{ github.repository }})/$(basename ${{ github.repository }})"
        git diff --quiet --exit-code README.md || \
          git commit README.md -m "Update coverage badge in README.md"

    # ── Badge: nolint count ────────────────────────────────────────────────
    - name: Count nolint occurrences
      id: count_nolint
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: bash
      run: |
        count=$(grep -r -E '//\s*nolint' . | wc -l)
        echo "nolint_count=$count" >> "$GITHUB_OUTPUT"

    - name: Update README nolint badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: bash
      run: |
        count=${{ steps.count_nolint.outputs.nolint_count }}
        new_url="https://img.shields.io/badge/nolint_count-${count}-orange"

        if grep -qP '\!\[nolint count\]\(\K[^)]+' README.md; then
          existing=$(grep -oP '\!\[nolint count\]\(\K[^)]+' README.md)
          old_count=$(echo "$existing" | grep -oP 'nolint_count-\K\d+')
          if [ "$count" != "$old_count" ]; then
            sed -i "s|![nolint count]($existing)|![nolint count]($new_url)|g" README.md
            echo "Badge updated."
          else
            echo "Badge already up-to-date."
          fi
        else
          echo "![nolint count]($new_url)" >> README.md
          echo "Badge added."
        fi

    - name: Commit nolint badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: bash
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name  "GitHub-Action"
        git diff --quiet --exit-code README.md || \
          git commit README.md -m "Update nolint count badge in README.md"

    # ── Push badge commits ─────────────────────────────────────────────────
    - name: Push badge commits
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ github.token }}
        branch: ${{ github.ref }}

    # ── Postman integration tests ─────────────────────────────────────────
    - name: Start server for Postman
      if: ${{ inputs.POSTMAN_ENABLED == 'true' }}
      shell: bash
      run: |
        if [ -n "${{ inputs.SERVER_COMMAND }}" ]; then
          ${{ inputs.SERVER_COMMAND }}
        fi
        GOFR_ENV=test go run main.go &
        sleep 30

    - name: Run Postman collection
      if: ${{ inputs.POSTMAN_ENABLED == 'true' }}
      shell: bash
      run: |
        npm install -g newman
        newman run "postman-collections/${{ inputs.APP_NAME }}.postman-collection.json"

    - name: Stop server
      if: ${{ inputs.POSTMAN_ENABLED == 'true' }}
      shell: bash
      run: pkill main || true