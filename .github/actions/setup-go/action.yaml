name: 'Setup Go Build'
description: 'Setup Go environment, download dependencies, and build'

inputs:
  go_version:
    description: 'Go version'
    required: false
    default: '1.20'
  build_command:
    description: 'Build command'
    required: true
  docker_file_path:
    description: 'Dockerfile directory'
    required: false
    default: '.'
  artifact_path:
    description: 'Built artifact path (relative to docker_file_path)'
    required: false
    default: 'main'
  extra_dependencies:
    description: 'Enable extra dependencies step'
    required: false
    default: 'false'
  dependencies_command:
    description: 'Commands to install extra dependencies'
    required: false
    default: ''
  pat:
    description: 'GitHub PAT for private repos'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go_version }}

    - name: Get dependencies
      shell: bash
      run: |
        if [[ -n "${{ inputs.pat }}" ]]; then
          git config --global url."https://${{ inputs.pat }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        fi
        git config --global http.sslVerify false
        go mod download

    - name: Extra dependencies
      if: inputs.extra_dependencies == 'true'
      shell: bash
      run: ${{ inputs.dependencies_command }}

    - name: Build
      shell: bash
      run: |
        mkdir -p build
        directory=$(pwd)
        cd ${{ inputs.docker_file_path }}
        ${{ inputs.build_command }}
        if [ "${{ inputs.docker_file_path }}" != "." ]; then
          mv ${{ inputs.artifact_path }} "$directory"
        fi
