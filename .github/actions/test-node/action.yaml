name: 'Test and Lint — Node'
description: 'Installs deps (npm or yarn, GitHub Packages or GAR), runs ESLint, Prettier, tests, and commits coverage badges.'

inputs:
  NODE_VERSION:
    description: 'node version'
    required: false
    default: '18'
  PACKAGE_MANAGER:
    description: 'npm or yarn'
    required: false
    default: 'npm'
  DEPENDENCIES_FLAG:
    description: 'Extra flags for install command (e.g. --legacy-peer-deps)'
    required: false
    default: ''
  TEST_COMMAND:
    description: 'command to run test files'
    required: false
    default: ''
  LINTER_CHECKS:
    description: 'enable linter checks'
    required: false
    default: 'true'
  PRETTIER_CHECKS:
    description: 'enable prettier checks'
    required: false
    default: 'true'
  ENABLE_TESTS:
    description: 'enable tests'
    required: false
    default: 'true'
  USE_GAR_PKG:
    description: 'Use Google Artifact Registry for @zopsmart scoped packages'
    required: false
    default: 'false'

  # Secrets passed as inputs (composite actions cannot declare secrets natively
  # in older GHA runners — pass them as inputs and reference via ${{ inputs.* }})
  PAT:
    description: 'GitHub PAT for private repos'
    required: false
    default: ''
  NPM_TOKEN:
    description: 'GitHub token for private repos'
    required: false
    default: ''
  REGISTRY_CREDENTIALS:
    description: 'Registry auth (GCP SA JSON, AWS JSON, Azure JSON, or token)'
    required: false
    default: ''

runs:
  using: composite
  steps:

    # ── Language runtime ───────────────────────────────────────────────────
    - uses: actions/setup-node@v3
      with:
        node-version: ${{ inputs.NODE_VERSION }}

    # ── Authorize GCP service account (GAR path only) ──────────────────────
    - name: Authorize GCP service account
      if: ${{ inputs.USE_GAR_PKG == 'true' }}
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ inputs.REGISTRY_CREDENTIALS }}

    # ── Install dependencies ───────────────────────────────────────────────
    #
    # Registry selection matrix:
    #   USE_GAR_PKG=true  → @zopsmart scoped packages from GAR (npm or yarn)
    #   USE_GAR_PKG=false + npm   → @zopsmart from GitHub Packages, PAT auth
    #   USE_GAR_PKG=false + yarn  → @zopsmart from GitHub Packages, NPM_TOKEN auth
    #
    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.USE_GAR_PKG }}" = "true" ]; then
          echo '${{ inputs.REGISTRY_CREDENTIALS }}' > credentials.json
          PROJECT_ID=$(jq -r '.project_id' credentials.json)
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          echo "@zopsmart:registry=https://us-central1-npm.pkg.dev/${PROJECT_ID}/npm-packages/" >> ~/.npmrc
          echo "//us-central1-npm.pkg.dev/${PROJECT_ID}/npm-packages/:_authToken=${ACCESS_TOKEN}" >> ~/.npmrc
        else
          if [ "${{ inputs.PACKAGE_MANAGER }}" = "yarn" ]; then
            echo "@zopsmart:registry=https://npm.pkg.github.com/" >> ~/.npmrc
            echo "//npm.pkg.github.com/:_authToken=${{ inputs.NPM_TOKEN }}" >> ~/.npmrc
          else
            echo "@zopsmart:registry=https://npm.pkg.github.com/" >> ~/.npmrc
            echo "//npm.pkg.github.com/:_authToken=${{ inputs.PAT }}" >> ~/.npmrc
          fi
        fi

        if [ "${{ inputs.PACKAGE_MANAGER }}" = "yarn" ]; then
          yarn install ${{ inputs.DEPENDENCIES_FLAG }}
        else
          npm install ${{ inputs.DEPENDENCIES_FLAG }}
        fi

        tar -zcf node_modules.zip node_modules/

    # ── Lint ──────────────────────────────────────────────────────────────
    - name: Run linter
      if: ${{ inputs.LINTER_CHECKS == 'true' }}
      shell: bash
      run: |
        if [ "${{ inputs.PACKAGE_MANAGER }}" = "yarn" ]; then
          CI=false yarn lint
        else
          CI=false npm run lint
        fi

    # ── Prettier ──────────────────────────────────────────────────────────
    - name: Run Prettier check
      if: ${{ inputs.PRETTIER_CHECKS == 'true' }}
      shell: bash
      run: |
        if [ "${{ inputs.PACKAGE_MANAGER }}" = "yarn" ]; then
          CI=false yarn prettier:check
        else
          CI=false npm run prettier:check
        fi

    # ── Tests ─────────────────────────────────────────────────────────────
    - name: Run tests
      if: ${{ inputs.ENABLE_TESTS == 'true' }}
      shell: bash
      run: ${{ inputs.TEST_COMMAND }}

    # ── Coverage badge ─────────────────────────────────────────────────────
    - name: Generate coverage badges
      if: |
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        inputs.ENABLE_TESTS == 'true'
      shell: bash
      run: |
        if [ "${{ inputs.PACKAGE_MANAGER }}" = "yarn" ]; then
          CI=false yarn make-badges
        else
          CI=false npm run make-badges
        fi

    - name: Commit coverage badge
      if: |
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        inputs.ENABLE_TESTS == 'true'
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name  "github-actions[bot]"
        git diff --quiet --exit-code README.md || \
          git commit -a -m "Update badges in README.md"

    - name: Push coverage badge
      if: |
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        inputs.ENABLE_TESTS == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ inputs.PAT }}
        branch: ${{ github.ref }}